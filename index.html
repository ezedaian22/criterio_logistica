const useContacts = () => {
  const [contacts,setContacts] = useState([]);
  const [loading,setLoading] = useState(true);

  const fetch_ = async () => {
    const {data} = await db.from("contacts").select("*").order("name");
    setContacts(data || []);
    setLoading(false);
  };
  useEffect(()=>{fetch_();},[]);

  const geocode = async(address) => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ", Argentina")}&limit=1`);
      const data = await res.json();
      if(data && data.length > 0) return {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
    } catch(e) {}
    return {lat: null, lng: null};
  };

  const add = async(c) => {
    const coords = await geocode(c.address);
    const n={...c, id:uid(), lat: coords.lat, lng: coords.lng};
    const {data}=await db.from("contacts").insert([n]).select();
    if(data) setContacts(prev=>[...prev,data[0]]);
  };
  const update = async(c) => {
    let updated = {...c};
    if(!c.lat || !c.lng) {
      const coords = await geocode(c.address);
      updated = {...c, lat: coords.lat, lng: coords.lng};
    }
    await db.from("contacts").update(updated).eq("id",c.id);
    setContacts(prev=>prev.map(x=>x.id===c.id?updated:x));
  };
  const del = async(id) => {
    await db.from("contacts").delete().eq("id",id);
    setContacts(prev=>prev.filter(x=>x.id!==id));
  };
  return {contacts,loading,add,update,del};
};

const useRutas = () => {
  const [rutas,setRutas] = useState([]);
  const [loading,setLoading] = useState(true);

  const fetch_ = async() => {
    const {data}=await db.from("rutas").select("*").order("fecha",{ascending:false}).limit(60);
    setRutas(data||[]);
    setLoading(false);
  };
  useEffect(()=>{fetch_();},[]);
  useEffect(()=>{
    const ch=db.channel("rutas_rt").on("postgres_changes",{event:"*",schema:"public",table:"rutas"},()=>fetch_()).subscribe();
    return ()=>db.removeChannel(ch);
  },[]);

  const add = async(r) => {
    const n={...r,id:uid()};
    await db.from("rutas").insert([n]);
    setRutas(prev=>[n,...prev]);
    return n;
  };
  const updateParadas = async(rutaId,paradas) => {
    await db.from("rutas").update({paradas}).eq("id",rutaId);
    setRutas(prev=>prev.map(r=>r.id===rutaId?{...r,paradas}:r));
  };
  return {rutas,loading,add,updateParadas};
};

const MapaTalleres = ({talleres,asignaciones,onAsignar}) => {
  const mapRef = useRef(null);
  const mapInstance = useRef(null);
  const markersRef = useRef({});

  useEffect(()=>{
    if(!mapRef.current||mapInstance.current) return;
    mapInstance.current = L.map(mapRef.current).setView([-34.64,-58.44],12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(mapInstance.current);
  },[]);

  useEffect(()=>{
    if(!mapInstance.current) return;
    // Limpiar marcadores anteriores
    Object.values(markersRef.current).forEach(m=>m.remove());
    markersRef.current={};

    talleres.forEach(t=>{
      if(!t.lat||!t.lng) return;
      const asig = asignaciones[t.id];
      const cam = CAMIONETAS.find(c=>c.id===asig);
      const color = cam?cam.color:"#888";
      const icon = L.divIcon({
        html:`<div style="background:${color};width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,
        iconSize:[16,16],iconAnchor:[8,8],className:""
      });
      const m = L.marker([t.lat,t.lng],{icon}).addTo(mapInstance.current);
      m.bindPopup(`<b>${t.name}</b><br>${t.address}`);
      markersRef.current[t.id]=m;
    });
  },[talleres,asignaciones]);

  return <div ref={mapRef} style={{height:320,width:"100%",borderRadius:12,marginBottom:16}}/>;
};

// ─── LOGIN ────────────────────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [u,setU] = useState(()=>localStorage.getItem("criterio_user")||"");
  const [p,setP] = useState(()=>localStorage.getItem("criterio_pass")||"");
  const [err,setErr] = useState(""); const [showP,setShowP] = useState(false);
  const [recordar,setRecordar] = useState(()=>!!localStorage.getItem("criterio_user"));
  const handle = () => {
    const user=USERS.find(x=>x.username===u&&x.password===p);
    if(user){
      if(recordar){localStorage.setItem("criterio_user",u);localStorage.setItem("criterio_pass",p);}
      else{localStorage.removeItem("criterio_user");localStorage.removeItem("criterio_pass");}
      onLogin(user);
    } else setErr("Usuario o contraseña incorrectos");
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="fade-in" style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <h1 style={{fontSize:52,color:C.accent,letterSpacing:4}}>CRITERIO</h1>
          <p style={{color:C.muted,fontSize:13,letterSpacing:2,textTransform:"uppercase",marginTop:4}}>Sistema de Logística</p>
        </div>
        <Card>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Usuario</label>
            <input value={u} onChange={e=>setU(e.target.value)} placeholder="Ezequiel / Kike / Victor" onKeyDown={e=>e.key==="Enter"&&handle()}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Contraseña</label>
            <div style={{position:"relative"}}>
              <input type={showP?"text":"password"} value={p} onChange={e=>setP(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()} style={{paddingRight:44}}/>
              <button onClick={()=>setShowP(!showP)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:showP?C.accent:C.muted,fontSize:18,padding:0}}>
                {showP?"🙈":"👁️"}
              </button>
            </div>
          </div>
          {err&&<p style={{color:C.danger,fontSize:13,marginBottom:12}}>{err}</p>}
          <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,cursor:"pointer",fontSize:13,color:C.muted}}>
            <input type="checkbox" checked={recordar} onChange={e=>setRecordar(e.target.checked)}/>
            Recordar mis datos
          </label>
          <Btn onClick={handle} style={{width:"100%"}}>Ingresar</Btn>
        </Card>
        <p style={{textAlign:"center",color:C.muted,fontSize:12,marginTop:20}}>Ecuador 425, CABA · Lavalle Comercial SRL</p>
      </div>
    </div>
  );
};

// ─── CONTACTOS ────────────────────────────────────────────────────────────────
const ContactosPanel = ({contacts,add,update,del,loading}) => {
  const [filter,setFilter] = useState("todos");
  const [modal,setModal] = useState(null);
  const [form,setForm] = useState({type:"taller",name:"",address:"",phone:"",notes:""});
  const [saving,setSaving] = useState(false);
  const filtered = filter==="todos"?contacts:contacts.filter(c=>c.type===filter);
  const openNew = ()=>{setForm({type:"taller",name:"",address:"",phone:"",notes:""});setModal("new");};
  const openEdit = (c)=>{setForm({...c});setModal("edit");};
  const save_ = async()=>{
    if(!form.name||!form.address) return;
    setSaving(true);
    if(modal==="new") await add(form); else await update(form);
    setSaving(false); setModal(null);
  };
  if(loading) return <Loading text="Cargando contactos..."/>;
  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <h2 style={{fontSize:28,color:C.accentLight}}>Contactos</h2>
        <Btn onClick={openNew}>+ Agregar</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {["todos","taller","cliente","proveedor","botonera"].map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{padding:"6px 16px",borderRadius:20,fontSize:13,cursor:"pointer",border:`1px solid ${filter===t?C.accent:C.border}`,background:filter===t?C.accent:"transparent",color:filter===t?"#000":C.muted}}>{t==="todos"?"Todos":typeLabel[t]}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:12}}>
        {filtered.map(c=>(
          <Card key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <span className="badge" style={{background:typeColor[c.type]+"22",color:typeColor[c.type],border:`1px solid ${typeColor[c.type]}44`}}>{typeLabel[c.type]}</span>
                <span style={{fontWeight:600}}>{c.name}</span>
              </div>
              <p style={{color:C.muted,fontSize:13}}>📍 {c.address}</p>
              {c.phone&&<p style={{color:C.muted,fontSize:13}}>📞 {c.phone}</p>}
              {c.notes&&<p style={{color:C.muted,fontSize:12,marginTop:4,fontStyle:"italic"}}>{c.notes}</p>}
            </div>
            <div style={{display:"flex",gap:8,flexShrink:0}}>
              <Btn small outline onClick={()=>openEdit(c)}>Editar</Btn>
              <Btn small onClick={()=>del(c.id)} color={C.danger}>✕</Btn>
            </div>
          </Card>
        ))}
        {filtered.length===0&&<p style={{color:C.muted,textAlign:"center",padding:40}}>No hay contactos en esta categoría</p>}
      </div>
      {modal&&(
        <Modal title={modal==="new"?"Nuevo Contacto":"Editar Contacto"} onClose={()=>setModal(null)}>
          {[["Tipo","select"],["Nombre *","name"],["Dirección *","address"],["Teléfono","phone"],["Notas","notes"]].map(([label,field])=>(
            <div key={field} style={{marginBottom:14}}>
              <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>{label}</label>
              {field==="select"?(<select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>{["taller","cliente","proveedor","botonera"].map(t=><option key={t} value={t}>{typeLabel[t]}</option>)}</select>)
              :field==="notes"?(<textarea value={form[field]||""} onChange={e=>setForm({...form,[field]:e.target.value})} rows={2}/>)
              :(<input value={form[field]||""} onChange={e=>setForm({...form,[field]:e.target.value})}/>)}
            </div>
          ))}
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn onClick={save_} style={{flex:1}} disabled={saving}>{saving?"Guardando...":"Guardar"}</Btn>
            <Btn onClick={()=>setModal(null)} outline style={{flex:1}}>Cancelar</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── PANEL RUTAS ──────────────────────────────────────────────────────────────
const RutasPanel = ({contacts,rutas,addRuta,updateParadas,loading,currentUser}) => {
  const [fecha,setFecha] = useState(today());
  const [modal,setModal] = useState(false);
  const [camId,setCamId] = useState(1);
  const [paradas,setParadas] = useState([]);
  const [contactoId,setContactoId] = useState("");
  const [tipoParada,setTipoParada] = useState("entrega");
  const [formTaller,setFormTaller] = useState(null);
  const [saving,setSaving] = useState(false);

  const [modalExtra,setModalExtra] = useState(null); // {rutaId}
  const [contactoExtra,setContactoExtra] = useState("");
  const [tipoExtra,setTipoExtra] = useState("entrega");
  const [formTallerExtra,setFormTallerExtra] = useState(null);

  const selContactExtra = contacts.find(x=>x.id===contactoExtra||x.id===String(contactoExtra));

  const agregarParadaExtra = ()=>{
    if(!contactoExtra||!selContactExtra) return;
    if(selContactExtra.type==="taller"){setFormTallerExtra({contacto:selContactExtra});}
    else{
      const ruta=rutas.find(r=>r.id===modalExtra?.rutaId);
      if(!ruta) return;
      const nuevaParada={id:uid(),contacto:selContactExtra,tipo:tipoExtra,estado:"pendiente",retirar:false,entregarBolsa:false,entregarCorte:false,prioritario:false,horaPriority:"",prendas:""};
      updateParadas(ruta.id,[...ruta.paradas,nuevaParada]);
      setContactoExtra("");
    }
  };

  const confirmarTallerExtra = async(opc)=>{
    const ruta=rutas.find(r=>r.id===modalExtra?.rutaId);
    if(!ruta) return;
    const nuevaParada={id:uid(),contacto:formTallerExtra.contacto,tipo:"taller",estado:"pendiente",prendas:"",...opc};
    await updateParadas(ruta.id,[...ruta.paradas,nuevaParada]);
    setFormTallerExtra(null);setContactoExtra("");
  };

  const rutasHoy = rutas.filter(r=>r.fecha===fecha);
  const selContact = contacts.find(x=>x.id===contactoId||x.id===String(contactoId));

  const handleAgregar = ()=>{
    if(!contactoId||!selContact) return;
    if(selContact.type==="taller"){setFormTaller({contacto:selContact});}
    else{setParadas(prev=>[...prev,{id:uid(),contacto:selContact,tipo:tipoParada,estado:"pendiente",retirar:false,entregarBolsa:false,entregarCorte:false,prioritario:false,horaPriority:"",prendas:""}]);setContactoId("");}
  };

  const confirmarTaller = (opc)=>{
    setParadas(prev=>[...prev,{id:uid(),contacto:formTaller.contacto,tipo:"taller",estado:"pendiente",prendas:"",...opc}]);
    setFormTaller(null);setContactoId("");
  };

  const removeParada = (id)=>setParadas(prev=>prev.filter(p=>p.id!==id));

  const paradasOrd = [...paradas].sort((a,b)=>{
    if(a.prioritario&&!b.prioritario) return -1;
    if(!a.prioritario&&b.prioritario) return 1;
    if(a.prioritario&&b.prioritario&&a.horaPriority&&b.horaPriority) return a.horaPriority.localeCompare(b.horaPriority);
    return 0;
  });

  const guardarRuta = async()=>{
    if(!paradas.length) return;
    setSaving(true);
    await addRuta({fecha,camionetaId:Number(camId),paradas:paradasOrd,creada:timeNow()});
    setSaving(false);setModal(false);setParadas([]);setFormTaller(null);
  };

  const updateParada = async(rutaId,paradaId,updates)=>{
    const ruta=rutas.find(r=>r.id===rutaId);
    if(!ruta) return;
    const nuevas=ruta.paradas.map(p=>p.id===paradaId?{...p,...updates}:p);
    await updateParadas(rutaId,nuevas);
  };

  const EMPRESA = encodeURIComponent("Ecuador 425, Buenos Aires, Argentina");
  const mapsUrl = (ps)=>`https://www.google.com/maps/dir/${EMPRESA}/${ps.map(p=>encodeURIComponent(p.contacto.address)).join("/")}/${EMPRESA}`;

  if(currentUser.role==="chofer"){
    if(loading) return <Loading text="Cargando ruta..."/>;
    const ruta=rutas.find(r=>r.fecha===today()&&r.camionetaId===currentUser.camionetaId);
    if(!ruta) return (
      <div className="fade-in" style={{textAlign:"center",padding:60}}>
        <p style={{fontSize:48,marginBottom:16}}>🚐</p>
        <h2 style={{color:C.accentLight,marginBottom:8}}>Sin ruta asignada</h2>
        <p style={{color:C.muted}}>No hay ruta para hoy. Consultá con Ezequiel.</p>
      </div>
    );
    return (
      <div className="fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
          <div>
            <h2 style={{fontSize:28,color:C.accentLight}}>Mi Ruta — {today()}</h2>
            <p style={{color:C.muted,fontSize:13}}>{ruta.paradas.length} paradas</p>
          </div>
          <a href={mapsUrl(ruta.paradas)} target="_blank" rel="noreferrer"
            style={{background:C.info,color:"#fff",padding:"10px 20px",borderRadius:8,textDecoration:"none",fontWeight:600,fontSize:14}}>
            🗺️ Ver ruta completa
          </a>
        </div>
        <div style={{display:"grid",gap:14}}>
          {ruta.paradas.map((p,i)=>{
            const esTaller=p.tipo==="taller";
            const completada=p.estado==="completada";
            const noEntregado=p.estado==="no_entregado";
            return(
              <Card key={p.id} style={{border:`1px solid ${completada?C.success+"55":noEntregado?C.danger+"55":p.prioritario?C.warning+"55":C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{background:C.accent,color:"#000",width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</span>
                      <span style={{fontWeight:700,fontSize:16}}>{p.contacto.name}</span>
                      <span className="badge" style={{background:typeColor[p.contacto.type]+"22",color:typeColor[p.contacto.type]}}>{typeLabel[p.contacto.type]}</span>
                      {p.prioritario&&<span className="badge" style={{background:C.warning+"22",color:C.warning}}>⭐{p.horaPriority?` · ${p.horaPriority}`:""}</span>}
                    </div>
                    <p style={{color:C.muted,fontSize:13}}>📍 {p.contacto.address}</p>
                    {esTaller&&(
                      <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
                        {p.retirar&&<span className="badge" style={{background:C.accent+"22",color:C.accent}}>📦 Retirar</span>}
                        {p.entregarBolsa&&<span className="badge" style={{background:C.warning+"22",color:C.warning}}>👜 Bolsa</span>}
                        {p.entregarCorte&&<span className="badge" style={{background:C.info+"22",color:C.info}}>✂️ Corte</span>}
                      </div>
                    )}
                    {!esTaller&&<p style={{color:C.accent,fontSize:13,marginTop:6,fontWeight:600}}>{paradaDesc(p)}</p>}
                  </div>
                  <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.contacto.address)}`} target="_blank" rel="noreferrer"
                    style={{background:C.info,color:"#fff",padding:"7px 14px",borderRadius:8,textDecoration:"none",fontSize:13,fontWeight:600,flexShrink:0}}>Ir →</a>
                </div>
                {!completada&&!noEntregado&&(
                  <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
                    {esTaller&&p.retirar&&(
                      <div style={{marginBottom:12}}>
                        <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:6}}>Prendas retiradas</label>
                        <input type="number" placeholder="Cantidad" style={{width:160}} value={p.prendas||""} onChange={e=>updateParada(ruta.id,p.id,{prendas:e.target.value})}/>
                      </div>
                    )}
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <Btn small color={C.success} onClick={()=>updateParada(ruta.id,p.id,{estado:"completada",horaLlegada:timeNow()})}>
                        ✅ {esTaller?"Completado":p.tipo==="entrega"?"Entregado":"Completado"}
                      </Btn>
                      {!esTaller&&p.tipo==="entrega"&&(
                        <Btn small color={C.danger} onClick={()=>updateParada(ruta.id,p.id,{estado:"no_entregado",horaLlegada:timeNow()})}>❌ No se pudo entregar</Btn>
                      )}
                    </div>
                  </div>
                )}
                {completada&&(
                  <div style={{background:C.success+"18",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",marginTop:10}}>
                    <span style={{color:C.success,fontWeight:600}}>✅ Completado · {p.horaLlegada}</span>
                    {p.prendas&&<span style={{color:C.muted,fontSize:13}}>{p.prendas} prendas</span>}
                  </div>
                )}
                {noEntregado&&(
                  <div style={{background:C.danger+"18",borderRadius:8,padding:"10px 14px",marginTop:10}}>
                    <span style={{color:C.danger,fontWeight:600}}>❌ No se pudo entregar · {p.horaLlegada}</span>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <h2 style={{fontSize:28,color:C.accentLight}}>Rutas</h2>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={{width:"auto"}}/>
          <Btn onClick={()=>setModal(true)}>+ Nueva Ruta</Btn>
        </div>
      </div>
      {loading&&<Loading/>}
      {!loading&&rutasHoy.length===0&&(
        <Card style={{textAlign:"center",padding:40}}>
          <p style={{fontSize:40,marginBottom:12}}>🚐</p>
          <p style={{color:C.muted}}>No hay rutas para esta fecha</p>
        </Card>
      )}
      {rutasHoy.map(ruta=>{
        const cam=CAMIONETAS.find(c=>c.id===ruta.camionetaId);
        const completadas=ruta.paradas.filter(p=>p.estado==="completada"||p.estado==="no_entregado").length;
        const pct=ruta.paradas.length?Math.round((completadas/ruta.paradas.length)*100):0;
        return(
          <Card key={ruta.id} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
              <div>
                <h3 style={{fontSize:20,color:C.accentLight}}>{cam?.nombre} — {cam?.chofer}</h3>
                <p style={{color:C.muted,fontSize:13}}>{ruta.paradas.length} paradas · {completadas}/{ruta.paradas.length} completadas</p>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{background:C.surface,borderRadius:20,padding:"4px 14px",fontSize:13,color:C.accent,fontWeight:600}}>{pct}%</span>
                <a href={mapsUrl(ruta.paradas)} target="_blank" rel="noreferrer"
                  style={{background:C.info,color:"#fff",padding:"8px 16px",borderRadius:8,textDecoration:"none",fontWeight:600,fontSize:13}}>🗺️ Ver ruta</a>
              </div>
            </div>
            <div style={{background:C.surface,borderRadius:6,height:6,marginBottom:14}}>
              <div style={{background:C.success,height:"100%",borderRadius:6,width:`${pct}%`,transition:"width .4s"}}/>
            </div>
            {ruta.paradas.map((p,i)=>(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <span style={{background:p.estado==="completada"?C.success:p.estado==="no_entregado"?C.danger:C.border,color:p.estado!=="pendiente"?"#fff":C.muted,width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>
                  {p.estado==="completada"?"✓":p.estado==="no_entregado"?"✕":i+1}
                </span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <p style={{fontWeight:600,fontSize:14}}>{p.contacto.name}</p>
                    {p.prioritario&&<span className="badge" style={{background:C.warning+"22",color:C.warning,fontSize:11}}>⭐{p.horaPriority&&` ${p.horaPriority}`}</span>}
                  </div>
                  <p style={{color:C.muted,fontSize:12}}>{paradaDesc(p)}{p.prendas&&` · ${p.prendas} prendas`}</p>
                </div>
                {p.horaLlegada&&<span style={{color:C.muted,fontSize:12}}>{p.horaLlegada}</span>}
              </div>
            ))}
            <div style={{marginTop:12}}>
              <Btn small outline onClick={()=>{setModalExtra({rutaId:ruta.id});setContactoExtra("");setFormTallerExtra(null);}}>+ Agregar parada a esta ruta</Btn>
            </div>
          </Card>
        );
      })}
      {modal&&(
        <Modal title="Nueva Ruta" onClose={()=>{setModal(false);setParadas([]);setFormTaller(null);}}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Camioneta</label>
            <select value={camId} onChange={e=>setCamId(e.target.value)}>
              {CAMIONETAS.map(c=><option key={c.id} value={c.id}>{c.nombre} — {c.chofer}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Agregar Parada</label>
            <div style={{display:"grid",gap:8}}>
              <ContactoBuscador contacts={contacts} value={contactoId} onChange={(id)=>{setContactoId(id);setFormTaller(null);}}/>
              {selContact&&selContact.type!=="taller"&&(
                <select value={tipoParada} onChange={e=>setTipoParada(e.target.value)}>
                  <option value="entrega">🚚 Entrega</option>
                  <option value="compra">🛒 Compra</option>
                  <option value="visita">📌 Visita</option>
                </select>
              )}
              <Btn onClick={handleAgregar} outline disabled={!contactoId}>{selContact?.type==="taller"?"Definir acciones en taller →":"+ Agregar parada"}</Btn>
            </div>
            {formTaller&&<FormTaller contacto={formTaller.contacto} onConfirm={confirmarTaller} onCancel={()=>{setFormTaller(null);setContactoId("");}}/>}
          </div>
          {paradasOrd.length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Paradas ({paradasOrd.length})</p>
              {paradasOrd.map((p,i)=>(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.accent,fontWeight:700,minWidth:20}}>{i+1}</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <p style={{fontSize:13,fontWeight:600}}>{p.contacto.name}</p>
                      {p.prioritario&&<span className="badge" style={{background:C.warning+"22",color:C.warning,fontSize:11}}>⭐{p.horaPriority&&` ${p.horaPriority}`}</span>}
                    </div>
                    <p style={{fontSize:11,color:C.muted}}>{paradaDesc(p)}</p>
                  </div>
                  <button onClick={()=>removeParada(p.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:16}}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={guardarRuta} style={{flex:1}} disabled={!paradas.length||saving}>{saving?"Guardando...":"Guardar Ruta"}</Btn>
            <Btn onClick={()=>{setModal(false);setParadas([]);setFormTaller(null);}} outline style={{flex:1}}>Cancelar</Btn>
          </div>
        </Modal>
      )}
      {modalExtra&&(
        <Modal title="Agregar parada extra" onClose={()=>{setModalExtra(null);setContactoExtra("");setFormTallerExtra(null);}}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Contacto</label>
            <div style={{display:"grid",gap:8}}>
              <ContactoBuscador contacts={contacts} value={contactoExtra} onChange={(id)=>{setContactoExtra(id);setFormTallerExtra(null);}}/>
              {selContactExtra&&selContactExtra.type!=="taller"&&(
                <select value={tipoExtra} onChange={e=>setTipoExtra(e.target.value)}>
                  <option value="entrega">🚚 Entrega</option>
                  <option value="compra">🛒 Compra</option>
                  <option value="visita">📌 Visita</option>
                </select>
              )}
              <Btn onClick={agregarParadaExtra} outline disabled={!contactoExtra}>{selContactExtra?.type==="taller"?"Definir acciones en taller →":"+ Agregar parada"}</Btn>
            </div>
            {formTallerExtra&&<FormTaller contacto={formTallerExtra.contacto} onConfirm={confirmarTallerExtra} onCancel={()=>{setFormTallerExtra(null);setContactoExtra("");}}/>}
          </div>
          <Btn onClick={()=>{setModalExtra(null);setContactoExtra("");setFormTallerExtra(null);}} outline style={{width:"100%"}}>Cerrar</Btn>
        </Modal>
      )}
    </div>
  );
};
const HistorialPanel = ({rutas,loading}) => {
  const sorted=[...rutas].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,30);
  if(loading) return <Loading/>;
  return (
    <div className="fade-in">
      <h2 style={{fontSize:28,color:C.accentLight,marginBottom:24}}>Historial</h2>
      {sorted.length===0&&<p style={{color:C.muted,textAlign:"center",padding:40}}>Sin historial aún</p>}
      {sorted.map(ruta=>{
        const cam=CAMIONETAS.find(c=>c.id===ruta.camionetaId);
        const completadas=ruta.paradas.filter(p=>p.estado==="completada").length;
        const prendas=ruta.paradas.reduce((acc,p)=>acc+(Number(p.prendas)||0),0);
        return(
          <Card key={ruta.id} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <p style={{fontWeight:700}}>{ruta.fecha} · {cam?.nombre} — {cam?.chofer}</p>
                <p style={{color:C.muted,fontSize:13}}>{ruta.paradas.length} paradas · {completadas} completadas{prendas>0?` · ${prendas} prendas`:""}</p>
              </div>
              <span className="badge" style={{background:completadas===ruta.paradas.length?C.success+"22":C.warning+"22",color:completadas===ruta.paradas.length?C.success:C.warning}}>
                {completadas===ruta.paradas.length?"Completada":"Parcial"}
              </span>
            </div>
          </Card>
        );
      })}
    </div>
  );
};

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser] = useState(null);
  const [tab,setTab] = useState("rutas");
  const {contacts,loading:cL,add,update,del} = useContacts();
  const {rutas,loading:rL,add:addRuta,updateParadas} = useRutas();
  const {consultas,save:saveConsulta} = useConsultas();

  useEffect(()=>{if(user?.role==="chofer") setTab("rutas");},[user]);
  useEffect(()=>{if("Notification"in window&&user?.role==="chofer") Notification.requestPermission();},[user]);

  useEffect(()=>{
    if(user?.role!=="chofer") return;
    const iv=setInterval(()=>{
      const ruta=rutas.find(r=>r.fecha===today()&&r.camionetaId===user.camionetaId);
      if(!ruta) return;
      const pend=ruta.paradas.filter(p=>p.estado==="pendiente");
      if(pend.length>0&&"Notification"in window&&Notification.permission==="granted"){
        new Notification("Criterio — Parada sin confirmar",{body:`No olvidés tildar: ${pend[0].contacto.name}`});
      }
    },5*60*1000);
    return ()=>clearInterval(iv);
  },[rutas,user]);

  if(!user) return (<><style>{css}</style><Login onLogin={setUser}/></>);

  const isAdmin=user.role==="admin";
  const tabs=isAdmin
    ?[{id:"rutas",label:"🚐 Rutas"},{id:"consulta",label:"📲 Talleres"},{id:"contactos",label:"📋 Contactos"},{id:"historial",label:"📁 Historial"}]
    :[{id:"rutas",label:"🚐 Mi Ruta"}];

  return(
    <>
      <style>{css}</style>
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100}}>
          <h1 style={{fontSize:24,color:C.accent,letterSpacing:2}}>CRITERIO</h1>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{color:C.muted,fontSize:13}}>Hola, {user.name}</span>
            <Btn small outline onClick={()=>setUser(null)}>Salir</Btn>
          </div>
        </div>
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 20px",display:"flex",gap:4,overflowX:"auto"}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",padding:"14px 18px",fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",fontWeight:tab===t.id?600:400,color:tab===t.id?C.accent:C.muted,borderBottom:`2px solid ${tab===t.id?C.accent:"transparent"}`,transition:"all .2s"}}>{t.label}</button>
          ))}
        </div>
        <div style={{flex:1,padding:"24px 20px",maxWidth:800,margin:"0 auto",width:"100%"}}>
          {tab==="rutas"&&<RutasPanel contacts={contacts} rutas={rutas} addRuta={addRuta} updateParadas={updateParadas} loading={rL} currentUser={user}/>}
          {tab==="consulta"&&isAdmin&&<ConsultaPanel contacts={contacts} consultas={consultas} saveConsulta={saveConsulta} addRuta={addRuta} onRutasCreadas={()=>setTab("rutas")}/>}
          {tab==="contactos"&&isAdmin&&<ContactosPanel contacts={contacts} add={add} update={update} del={del} loading={cL}/>}
          {tab==="historial"&&isAdmin&&<HistorialPanel rutas={rutas} loading={rL}/>}
        </div>
        <div style={{textAlign:"center",padding:"16px 20px",color:C.muted,fontSize:11,borderTop:`1px solid ${C.border}`}}>
          Criterio Indumentaria · Lavalle Comercial SRL · Ecuador 425, CABA
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
